<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Benglishify Settings</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { height: auto; width: 300px; }
    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .setting-item:last-child { border-bottom: none; }
    .toggle {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px; width: 16px;
      left: 2px; bottom: 2px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: var(--accent); }
    input:checked + .slider:before { transform: translateX(20px); }
    .back-btn {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 13px;
      padding: 0;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <button id="back-btn" class="back-btn">← Back to Translator</button>
    <header>
      <h1>Settings</h1>
    </header>

    <main>
      <div class="setting-item">
        <span>Auto Translate</span>
        <label class="toggle">
          <input type="checkbox" id="auto-translate">
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-item">
        <span>Show Tooltip on Hover</span>
        <label class="toggle">
          <input type="checkbox" id="tooltip-enabled">
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-item">
        <span>Language Mode</span>
        <select id="language-mode" style="padding: 4px; border-radius: 4px; border: 1px solid var(--border);">
          <option value="benglish-to-english">Benglish → English</option>
          <option value="english-to-benglish">English → Benglish</option>
        </select>
      </div>
    </main>

    <footer style="font-size: 10px; color: #999; text-align: center; display: block;">
      Benglishify Chrome Extension v1.0
    </footer>
  </div>
  <script src="settings.js"></script>
</body>
</html>
